<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국 주식 분석 대시보드</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="logo">📈</span>
        <h1>한국 주식 분석 대시보드</h1>
      </div>
      <div class="header-right">
        <span id="market-status-badge" class="status-badge">로딩 중...</span>
        <span id="last-updated" class="last-updated"></span>
        <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
      </div>
    </div>
  </header>

  <main>
    <!-- 시장 지수 -->
    <section class="section">
      <h2 class="section-title">시장 현황</h2>
      <div id="indices-grid" class="indices-grid">
        <div class="index-card skeleton"></div>
        <div class="index-card skeleton"></div>
        <div class="index-card skeleton"></div>
      </div>
    </section>

    <!-- 종목 리스트 -->
    <section class="section">
      <div class="stocks-header">
        <h2 class="section-title">종목 분석</h2>
        <div class="stocks-controls">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="종목명 검색"
              oninput="onSearch(this.value)"
            />
            <button id="search-clear" class="search-clear hidden" onclick="clearSearch()">✕</button>
          </div>
          <div class="filter-tabs">
            <button class="tab active" onclick="filterMarket('ALL', this)">전체</button>
            <button class="tab" onclick="filterMarket('KOSPI', this)">KOSPI</button>
            <button class="tab" onclick="filterMarket('KOSDAQ', this)">KOSDAQ</button>
          </div>
        </div>
      </div>
      <div class="table-wrapper">
        <table class="stocks-table">
          <thead>
            <tr>
              <th>종목</th>
              <th class="right">현재가</th>
              <th class="right">등락률</th>
              <th class="right">거래량</th>
              <th class="center has-tip" data-tip="RSI (상대강도지수)&#10;&#10;주가 상승/하락의 속도를 0~100으로 측정합니다.&#10;&#10;• 30 이하  →  과매도 (반등 가능성)&#10;• 30~40  →  저평가 구간&#10;• 40~60  →  중립&#10;• 60~70  →  고평가 구간&#10;• 70 이상  →  과매수 (조정 가능성)&#10;&#10;기간: 14일">RSI ⓘ</th>
              <th class="center has-tip" data-tip="MACD (이동평균 수렴·확산)&#10;&#10;단기(12일)와 장기(26일) 지수이동평균의 차이입니다.&#10;&#10;• 히스토그램 > 0  →  상승 모멘텀&#10;• 히스토그램 < 0  →  하락 모멘텀&#10;• MACD > Signal  →  골든크로스 (매수)&#10;• MACD < Signal  →  데드크로스 (매도)">MACD ⓘ</th>
              <th class="right has-tip" data-tip="이동평균 (MA, Moving Average)&#10;&#10;일정 기간의 평균 종가로 추세를 파악합니다.&#10;&#10;• 현재가 > MA20  →  단기 상승 추세&#10;• 현재가 < MA20  →  단기 하락 추세">MA20 ⓘ</th>
              <th class="center has-tip" data-tip="종합 신호&#10;&#10;RSI·MACD·볼린저밴드·이동평균을&#10;종합한 매매 참고 신호입니다.&#10;&#10;점수 기준:&#10;• ≥ +5  →  강력 매수&#10;• +2 ~ +4  →  매수&#10;• -1 ~ +1  →  중립&#10;• -4 ~ -2  →  매도&#10;• ≤ -5  →  강력 매도&#10;&#10;⚠️ 기술적 지표 기반 참고용입니다.">신호 ⓘ</th>
            </tr>
          </thead>
          <tbody id="stocks-tbody">
            <tr><td colspan="8" class="loading-row">데이터 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- 상세 모달 -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal" id="detail-modal">
      <div class="modal-header">
        <div>
          <h2 id="modal-name"></h2>
          <span id="modal-ticker" class="modal-ticker"></span>
          <span id="modal-sector" class="modal-sector-badge"></span>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="modal-price-row">
        <span id="modal-price" class="modal-price"></span>
        <span id="modal-change" class="modal-change"></span>
      </div>

      <div class="modal-meta-row">
        <span>당일 고가: <b id="modal-day-high"></b></span>
        <span>당일 저가: <b id="modal-day-low"></b></span>
        <span>52주 고가: <b id="modal-52h"></b></span>
        <span>52주 저가: <b id="modal-52l"></b></span>
        <span>거래량: <b id="modal-vol"></b></span>
      </div>

      <!-- 52주 범위 바 -->
      <div class="range-bar-wrap">
        <span id="modal-52l-label" class="range-label"></span>
        <div class="range-bar">
          <div id="modal-range-fill" class="range-fill"></div>
          <div id="modal-range-dot" class="range-dot"></div>
        </div>
        <span id="modal-52h-label" class="range-label"></span>
      </div>

      <!-- 가격 차트 -->
      <div class="chart-wrap">
        <canvas id="price-chart"></canvas>
      </div>

      <!-- 지표 카드 -->
      <div class="indicator-grid">
        <div class="ind-card">
          <div class="ind-label has-tip" data-tip="RSI (상대강도지수)&#10;&#10;주가 상승/하락의 속도를 0~100으로 측정합니다.&#10;&#10;• 30 이하  →  과매도 (반등 가능성)&#10;• 30~40  →  저평가 구간&#10;• 40~60  →  중립&#10;• 60~70  →  고평가 구간&#10;• 70 이상  →  과매수 (조정 가능성)&#10;&#10;기간: 14일">RSI (14) ⓘ</div>
          <div id="ind-rsi" class="ind-value"></div>
          <div id="ind-rsi-bar" class="rsi-bar-wrap">
            <div class="rsi-bar-track">
              <div id="rsi-bar-fill" class="rsi-bar-fill"></div>
            </div>
            <div id="rsi-bar-dot" class="rsi-bar-dot"></div>
          </div>
          <div id="ind-rsi-label" class="ind-sub"></div>
        </div>
        <div class="ind-card">
          <div class="ind-label has-tip" data-tip="MACD (이동평균 수렴·확산)&#10;&#10;단기(12일)와 장기(26일) 지수이동평균의 차이입니다.&#10;&#10;• 히스토그램 > 0  →  상승 모멘텀&#10;• 히스토그램 < 0  →  하락 모멘텀&#10;• MACD > Signal  →  골든크로스 (매수)&#10;• MACD < Signal  →  데드크로스 (매도)&#10;&#10;표시값: 히스토그램 (MACD - Signal)">MACD ⓘ</div>
          <div id="ind-macd" class="ind-value"></div>
          <div id="ind-macd-signal" class="ind-sub"></div>
          <div id="ind-macd-hist" class="ind-sub"></div>
        </div>
        <div class="ind-card">
          <div class="ind-label has-tip" data-tip="볼린저 밴드 (Bollinger Bands)&#10;&#10;20일 이동평균 기준 ±2σ(표준편차)로 그린&#10;가격 변동 범위입니다.&#10;&#10;• 현재가 < 하단  →  과매도 (반등 가능)&#10;• 현재가 > 상단  →  과매수 (조정 가능)&#10;• 밴드폭 수축  →  큰 변동성 예고&#10;&#10;표시값: 중간선 (20일 이동평균)">볼린저 밴드 ⓘ</div>
          <div id="ind-bb-upper" class="ind-sub">상단: -</div>
          <div id="ind-bb-mid" class="ind-value"></div>
          <div id="ind-bb-lower" class="ind-sub">하단: -</div>
          <div id="ind-bb-bw" class="ind-sub"></div>
        </div>
      </div>

      <!-- 이동평균 -->
      <div class="ma-section">
        <div class="ind-label has-tip" data-tip="이동평균 (MA, Moving Average)&#10;&#10;일정 기간의 평균 종가로 추세 방향을 파악합니다.&#10;&#10;• MA5   →  초단기 (1주)&#10;• MA20  →  단기 (1개월)&#10;• MA60  →  중기 (3개월)&#10;• MA120 →  장기 (6개월)&#10;&#10;현재가 > MA  →  상승 추세 (▲)&#10;MA20 > MA60  →  정배열, 강세 신호">이동평균 ⓘ</div>
        <div class="ma-grid" id="ma-grid"></div>
      </div>

      <!-- 신호 분석 -->
      <div class="signal-section">
        <div class="signal-section-header">
          <span class="ind-label has-tip" data-tip="종합 신호&#10;&#10;RSI·MACD·볼린저밴드·이동평균을&#10;종합한 매매 참고 신호입니다.&#10;&#10;점수 기준:&#10;• ≥ +5  →  강력 매수&#10;• +2 ~ +4  →  매수&#10;• -1 ~ +1  →  중립&#10;• -4 ~ -2  →  매도&#10;• ≤ -5  →  강력 매도&#10;&#10;⚠️ 기술적 지표 기반 참고용입니다.">종합 신호 ⓘ</span>
          <span id="modal-signal-badge" class="signal-badge-lg"></span>
          <span id="modal-signal-score" class="signal-score"></span>
        </div>
        <ul id="signal-reasons" class="signal-reasons"></ul>
      </div>
    </div>
  </div>

  <!-- 글로벌 툴팁 -->
  <div id="g-tooltip" class="g-tooltip"></div>

  <script src="/js/app.js"></script>
</body>
</html>
